# ============================================
# Mums'Home POS - Docker Compose
# ============================================

services:
  pos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mums-home-pos
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist SQLite database outside the container
      - pos-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0

volumes:
  pos-data:
    driver: local
